<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <div class="card shadow p-4" style="width: 400px;">
        <h2 class="text-center mb-4">Вхід в систему</h2>
        
        <div th:if="${param.error}" class="alert alert-danger">Невірний логін або пароль!</div>
        <div th:if="${param.logout}" class="alert alert-success">Ви успішно вийшли.</div>
        <div th:if="${param.registerSuccess}" class="alert alert-success">Реєстрація успішна! Увійдіть.</div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Логін</label>
                <input type="text" name="username" class="form-control" required/>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" required/>
            </div>
            <button type="submit" class="btn btn-primary w-100">Увійти</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Немає акаунту? <a href="/register">Зареєструватися</a></small>
        </div>
    </div>

</body>
</html>
