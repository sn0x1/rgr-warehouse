<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Товар</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card shadow p-4">
            <h3 class="mb-3">Редагування / Створення</h3>
            
            <form th:action="@{/products}" th:object="${product}" method="post">
                <input type="hidden" th:field="*{id}"/>
                
                <div class="mb-3">
                    <label class="form-label">Назва товару</label>
                    <input type="text" th:field="*{name}" class="form-control" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label">Посилання на картинку (URL)</label>
                    <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://..."/>
                    <div class="form-text">Скопіюйте сюди пряме посилання на зображення (jpg/png)</div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label">Опис</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>
                
                <div class="row">
                    <div class="col">
                        <label class="form-label">Ціна</label>
                        <input type="number" step="0.01" th:field="*{price}" class="form-control" required/>
                    </div>
                    <div class="col">
                        <label class="form-label">Кількість</label>
                        <input type="number" th:field="*{quantity}" class="form-control" required/>
                    </div>
                </div>
                
                <div class="mt-4 d-flex justify-content-between">
                    <a href="/products" class="btn btn-secondary">Скасувати</a>
                    <button type="submit" class="btn btn-success">Зберегти товар</button>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
