<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Наші Товари</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
        .card {
            transition: transform 0.2s; /* Анімація при наведенні */
        }
        .card:hover {
            transform: scale(1.02); /* Легке збільшення картки */
        }
        .product-img-container {
            height: 300px; /* Збільшили місце під фото */
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa; /* Сірий фон, якщо фото вузьке */
            overflow: hidden;
            padding: 10px; /* Відступ, щоб фото не прилипало до країв */
        }
        .product-img {
            max-height: 100%;
            max-width: 100%;
            object-fit: contain; /* Головна зміна: фото не обрізається, а вписується */
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">RGR Shop</a>
            <div class="d-flex">
                 <span class="navbar-text me-3 text-white" th:text="${#authentication.name}">User</span>
                 <form th:action="@{/logout}" method="post"><button class="btn btn-outline-light btn-sm">Вийти</button></form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📦 Каталог товарів</h2>
            <div sec:authorize="hasRole('ADMIN')">
                <a href="/products/new" class="btn btn-success">+ Додати товар</a>
            </div>
        </div>

        <div class="row row-cols-1 row-cols-md-3 g-4">
            
<div class="col" th:each="product : ${products}">
                <div class="card h-100 shadow-sm">
                    
                    <div class="product-img-container border-bottom">
                        <img th:if="${product.imageUrl != null && !product.imageUrl.isEmpty()}" 
                             th:src="${product.imageUrl}" class="product-img" alt="Product Image">
                        
                        <img th:unless="${product.imageUrl != null && !product.imageUrl.isEmpty()}" 
                             src="https://via.placeholder.com/300x300?text=No+Photo" class="product-img" alt="No Image">
                    </div>

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title" th:text="${product.name}">Назва</h5>
                        
                        <a th:if="${product.imageUrl != null && !product.imageUrl.isEmpty()}" 
                           th:href="${product.imageUrl}" target="_blank" class="text-decoration-none small mb-2">
                           🔍 Відкрити фото в оригіналі
                        </a>

                        <p class="card-text text-muted flex-grow-1" th:text="${product.description}">Опис...</p>
                        
                        <div class="mt-auto">
                            <h4 class="text-primary mb-0"><span th:text="${product.price}">0</span> ₴</h4>
                            <small class="text-secondary">На складі: <span th:text="${product.quantity}">0</span> шт.</small>
                        </div>
                    </div>
                    
                    <div class="card-footer bg-white border-top-0" sec:authorize="hasRole('ADMIN')">
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-primary">Ред.</a>
                            <a th:href="@{/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-outline-danger" 
                               onclick="return confirm('Видалити цей товар?');">Вид.</a>
                        </div>
                    </div>
                </div>
            </div>
            </div>
    </div>

</body>
</html>
